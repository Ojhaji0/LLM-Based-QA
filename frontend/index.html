<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University RAG - AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🎓</span>
                    <h1>UniRAG<span>.ai</span></h1>
                </div>
            </div>

            <div class="sidebar-section">
                <p class="section-label">Upload Document</p>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="pdf-upload" accept=".pdf,.doc,.docx" hidden>
                    <div class="upload-icon">📄</div>
                    <p>Drag & drop Document here</p>
                    <span>or</span>
                    <button class="upload-btn" id="upload-btn">Browse File</button>
                </div>
                <div id="upload-status" class="upload-status hidden"></div>
            </div>

            <div class="sidebar-section">
                <p class="section-label">Loaded Documents</p>
                <div id="doc-list" class="doc-list">
                    <p class="no-docs">No documents loaded.</p>
                </div>
            </div>

            <div class="status-badge">
                <span class="status-dot"></span>
                Local Llama 3.2 Active
            </div>
        </aside>

        <!-- Main Chat -->
        <div class="chat-wrapper">
            <main id="chat-container">
                <div class="welcome-msg" id="welcome-msg">
                    <h2>Welcome to the Admin Assistant</h2>
                    <p>Upload a Document (PDF/DOCX) on the left, then ask questions about it.</p>
                    <div class="sample-chips">
                        <button class="chip" onclick="setQuery('What is the attention mechanism?')">What is attention?</button>
                        <button class="chip" onclick="setQuery('Who wrote this paper?')">Who wrote this paper?</button>
                        <button class="chip" onclick="setQuery('What is the significance of the Transformer model?')">Significance of Transformer?</button>
                    </div>
                </div>
            </main>

            <footer>
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Ask a question about your document..." autocomplete="off">
                    <button id="send-btn" title="Send">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="footer-note">Powered by Hybrid Retrieval (BM25 + Dense) + BGE Reranker</p>
            </footer>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
